<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionando de imagem</title>

    <style>
        div{
            margin: 20px 0;
            width: 50%;
            margin: 0 auto;
           

        }
        div.img1{
            height: 300px;
            border: 1px solid black;
            border-radius: 10px;
            background-image: url("imagem/wallpaper002.jpg");
            background-repeat: no-repeat;
            background-position: bottom center;
        }
             div.img2{
            height: 300px;
            border: 1px solid black;
            border-radius: 10px;
            background-image: url("imagem/wallpaper002.jpg");
            
            background-repeat: no-repeat;
            background-position: left center;
        }
             div.img3{
            height: 300px;
            border: 1px solid black;
            border-radius: 10px;
            background-image: url("imagem/wallpaper002.jpg");
            background-repeat: no-repeat;
            background-position: right center;
        }
    </style>
</head>
<body>
    <div class="img1">

    </div>

      <div class="img2">


        
    </div>

      <div class="img3">
        
    </div>


    
</body>
</html>
